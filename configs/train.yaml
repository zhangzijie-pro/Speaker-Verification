seed: 1234
device: "cuda"
out_dir: "outputs_static"

data:
  out_dir: "processed/static_mix_cnceleb2"
  train_manifest: "train_manifest.jsonl"
  val_manifest: "val_manifest.jsonl"
  crop_sec: 4.0

model:
  feat_dim: 80
  channels: 512
  emb_dim: 192
  max_mix_speakers: 4

loss:
  lambda_ver: 1.0
  lambda_diar: 0.5
  act_w: 1.0
  id_w: 1.0
  cnt_w: 0.2
  pos_weight: 2.0

train:
  epochs: 80
  batch_size: 16
  num_workers: 4
  lr: 3e-4
  weight_decay: 3e-5
  grad_clip: 5.0
  amp: true
  val_batches: 100