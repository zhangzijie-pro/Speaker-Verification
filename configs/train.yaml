seed: 1234
device: "cuda"
out_dir: "outputs_static"

data:
  # preprocess_static_mix.py 的 out_dir
  out_dir: "processed/static_mix_cnceleb2"
  manifest: "train_manifest.jsonl"
  crop_sec: 4.0

model:
  feat_dim: 80
  channels: 512
  emb_dim: 256

loss:
  lambda_ver: 1.0
  lambda_diar: 0.5

train:
  epochs: 80
  batch_size: 32
  num_workers: 2
  lr: 3e-4
  weight_decay: 3e-5
  grad_clip: 5.0
  amp: true
  val_batches: 100